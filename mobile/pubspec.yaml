name: kawach
description: "AI-powered parametric income insurance for Q-commerce delivery riders."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.4

  # Navigation
  go_router: ^14.8.1

  # State management
  provider: ^6.1.5

  # HTTP client
  http: ^1.4.0

  # Location / GPS
  geolocator: ^13.0.2
  permission_handler: ^11.4.0

  # Map
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # Payment
  razorpay_flutter: ^1.3.8

  # Local storage
  shared_preferences: ^2.5.3

  # UI helpers
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/policy/kawach_income_protection_policy.md